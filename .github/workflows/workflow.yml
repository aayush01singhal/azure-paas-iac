
name: "Workflow for Terraform Infra Deployment"

run-name: "TF ${{ inputs.target_env }} | ${{ inputs.change_ref }} | @${{ github.actor }} | ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment (uat, sit, production, drhub)"
        required: true
        type: choice
        options: [uat, sit, production, drhub]

      working_directory:
        description: "Terraform config directory path."
        required: true
        default: "."

      change_ref:
        description: "Change referance ID."
        required: true
        type: string

      change_reason:
        description: "Reason for change."
        required: true
        type: string

      rollback_plan:
        description: "Rollback plan."
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: "tf-${{ inputs.target_env }}-${{ inputs.working_directory }}"
  cancel-in-progress: false

jobs:
  preflight:
    name: "Preflight"
    uses: Aayu1983/centeral-repo/.github/workflows/Preflight.yml@main
    
    with:
      target_env: ${{ inputs.target_env }}
      working_directory: ${{ inputs.working_directory }}

  plan:
    name: "Plan"
    needs: preflight
    uses: Aayu1983/centeral-repo/.github/workflows/plan.tf.yml@main
    with:
      target_env: ${{ inputs.target_env }}
      selected_branch: ${{ github.ref_name }}
      working_directory: ${{ inputs.working_directory }}
      change_ref: ${{ inputs.change_ref }}
      change_reason: ${{ inputs.change_reason }}
      rollback_plan: ${{ inputs.rollback_plan }}
    secrets: inherit

  approval:
    name: "Approval gate"
    needs: plan
    uses: Aayu1983/centeral-repo/.github/workflows/approver.yml@main
    with:
      target_env: ${{ inputs.target_env }}
      change_ref: ${{ inputs.change_ref }}
      change_reason: ${{ inputs.change_reason }}

  apply:
    name: "Apply"
    needs: [plan, approval]
    uses: Aayu1983/centeral-repo/.github/workflows/apply.tf.yml@main
    with:
      target_env: ${{ inputs.target_env }}
      working_directory: ${{ inputs.working_directory }}
      plan_commit_sha: ${{ github.sha }}
      plan_artifact_name: "tf-plan-${{ inputs.target_env }}-${{ github.run_id }}"
      change_ref: ${{ inputs.change_ref }}
    secrets: inherit
